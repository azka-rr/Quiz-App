<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <button id="modeBtn">🌙 Dark Mode</button>

        <h1>Quiz App</h1>

        <h2 id="pertanyaan"></h2>

        <div id="pilihan"></div>

        <button id="btnJawab">Jawab</button>

        <button id="btnRestart" style="display:none;">
            Main Lagi
        </button>

        <p>Skor: <span id="skor">0</span></p>

        <p>High Score: <span id="highScore">0</span></p>

        <p id="hasil"></p>

        <p id="progress"></p>

        <div class="timer-box">
            <span class="timer-text">⏰ Waktu</span>
            <span id="timer">10</span>
        </div>

        <div class="progress-bar">
            <div id="progressFill"></div>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
